<script>
/**
 * ============================================================================
 * AWIS' GARDEN - ENGINE 2.0 (EXPANDED CORE)
 * ============================================================================
 * Este código ha sido diseñado para ser un motor de juego 2D completo dentro 
 * de un solo archivo, implementando patrones de diseño de nivel industrial.
 */

// --- CONSTANTES Y CONFIGURACIÓN GLOBAL ---
const SETTINGS = {
    SCREEN: { WIDTH: 800, HEIGHT: 600, SCALE: 1 },
    TILE: 32,
    WORLD: { COLS: 50, ROWS: 40 }, // Mapa más grande para scroll
    TIME: {
        DAY_MINUTES: 20,
        FULL_CYCLE_MS: 20 * 60 * 1000,
        MORNING_START: 6,
        NIGHT_START: 19
    },
    PHYSICS: {
        FRICTION: 0.85,
        ACCEL: 0.6,
        MAX_SPEED: 4.0
    },
    PLANTS: {
        TYPES: ['ROSA', 'GIRASOL', 'LAVANDA', 'TULIPAN'],
        GROWTH_STAGES: 4
    }
};

// --- UTILIDADES TÉCNICAS ---
const Utils = {
    random: (min, max) => Math.random() * (max - min) + min,
    intRandom: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    lerp: (a, b, t) => a + (b - a) * t,
    clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
    dist: (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2)
};

// --- SISTEMA DE PARTÍCULAS AVANZADO ---
class Particle {
    constructor(x, y, color, life, vx, vy) {
        this.x = x; this.y = y;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.vx = vx; this.vy = vy;
        this.size = Utils.random(1, 3);
    }
    update(dt) {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= dt;
    }
}

class ParticleSystem {
    constructor() {
        this.particles = [];
    }
    emit(x, y, color, count = 10) {
        for(let i=0; i<count; i++) {
            this.particles.push(new Particle(
                x, y, color, 
                Utils.random(500, 1500),
                Utils.random(-1, 1), Utils.random(-1, 1)
            ));
        }
    }
    emitRain(width, height) {
        this.particles.push(new Particle(
            Utils.random(0, width), 0, '#44aaff', 
            2000, 0.5, Utils.random(5, 8)
        ));
    }
    update(dt) {
        for(let i=this.particles.length-1; i>=0; i--) {
            this.particles[i].update(dt);
            if(this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx, camera) {
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - camera.x, p.y - camera.y, p.size, p.size);
        });
        ctx.globalAlpha = 1.0;
    }
}

// --- GESTOR DE TEXTURAS (DIBUJO DE SPRITES POR CÓDIGO) ---
class SpriteManager {
    constructor() {
        this.sprites = {};
        this.init();
    }
    init() {
        this.sprites.grass = this.createCanvas(32, 32, (ctx) => {
            ctx.fillStyle = '#3a7d44'; ctx.fillRect(0,0,32,32);
            ctx.fillStyle = '#2d6335';
            for(let i=0; i<10; i++) ctx.fillRect(Utils.random(0,28), Utils.random(0,28), 2, 2);
        });
        this.sprites.player = this.createCanvas(32, 48, (ctx) => {
            ctx.fillStyle = '#4b2c20'; ctx.fillRect(8, 2, 16, 12); // Pelo
            ctx.fillStyle = '#ffdbac'; ctx.fillRect(10, 6, 12, 12); // Cara
            ctx.fillStyle = '#e91e63'; ctx.fillRect(8, 18, 16, 20); // Vestido
            ctx.fillStyle = '#000'; ctx.fillRect(12, 10, 2, 2); ctx.fillRect(18, 10, 2, 2);
        });
        this.sprites.seed = this.createCanvas(16, 16, (ctx) => {
            ctx.fillStyle = '#f0e68c'; ctx.beginPath();
            ctx.arc(8, 8, 4, 0, Math.PI*2); ctx.fill();
        });
        this.sprites.pot = this.createCanvas(32, 32, (ctx) => {
            ctx.fillStyle = '#a0522d'; ctx.fillRect(4, 10, 24, 18);
            ctx.fillStyle = '#8b4513'; ctx.fillRect(2, 6, 28, 6);
        });
        // Vegetación variada
        this.sprites.flower_rosa = this.createPlantSprite('#ff69b4');
        this.sprites.flower_girasol = this.createPlantSprite('#ffd700');
    }
    createCanvas(w, h, drawFn) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        drawFn(c.getContext('2d'));
        return c;
    }
    createPlantSprite(color) {
        return this.createCanvas(32, 32, (ctx) => {
            ctx.fillStyle = '#228b22'; ctx.fillRect(14, 10, 4, 22);
            ctx.fillStyle = color;
            for(let i=0; i<5; i++) {
                ctx.beginPath(); ctx.arc(16 + Math.cos(i)*6, 8 + Math.sin(i)*6, 5, 0, Math.PI*2); ctx.fill();
            }
        });
    }
}

// --- ENTIDADES DEL MUNDO ---
class Entity {
    constructor(x, y) { this.x = x; this.y = y; this.w = 32; this.h = 32; this.toRemove = false; }
    getCenter() { return { x: this.x + this.w/2, y: this.y + this.h/2 }; }
}

class SeedItem extends Entity {
    constructor(x, y) { super(x, y); this.w = 16; this.h = 16; this.bob = 0; }
    update(dt) { this.bob += 0.005 * dt; }
    draw(ctx, sprite, camera) {
        const yOff = Math.sin(this.bob) * 5;
        ctx.drawImage(sprite, this.x - camera.x, this.y - camera.y + yOff);
    }
}

class Pot extends Entity {
    constructor(x, y) {
        super(x, y);
        this.hasSeed = false;
        this.growth = 0;
        this.type = 'ROSA';
    }
    update(dt) {
        if(this.hasSeed && this.growth < 100) {
            this.growth += 0.00005 * dt;
        }
    }
    draw(ctx, sprites, camera) {
        ctx.drawImage(sprites.pot, this.x - camera.x, this.y - camera.y);
        if(this.hasSeed) {
            ctx.globalAlpha = Utils.clamp(this.growth / 10, 0, 1);
            let s = sprites.flower_rosa;
            if(this.growth > 80) ctx.drawImage(s, this.x - camera.x, this.y - camera.y - 10);
            else {
                ctx.fillStyle = '#228b22';
                ctx.fillRect(this.x - camera.x + 14, this.y - camera.y + 10, 4, 10);
            }
            ctx.globalAlpha = 1;
        }
    }
}

// --- SISTEMA DE CÁMARA ---
class Camera {
    constructor() {
        this.x = 0; this.y = 0;
        this.target = null;
    }
    follow(target) {
        this.x = Utils.lerp(this.x, target.x - SETTINGS.SCREEN.WIDTH/2, 0.1);
        this.y = Utils.lerp(this.y, target.y - SETTINGS.SCREEN.HEIGHT/2, 0.1);
        this.x = Utils.clamp(this.x, 0, SETTINGS.WORLD.COLS*32 - SETTINGS.SCREEN.WIDTH);
        this.y = Utils.clamp(this.y, 0, SETTINGS.WORLD.ROWS*32 - SETTINGS.SCREEN.HEIGHT);
    }
}

// --- SISTEMA DE TIEMPO ---
class Clock {
    constructor() {
        this.elapsed = 0;
        this.day = 1;
    }
    update(dt) {
        this.elapsed += dt;
        if(this.elapsed >= SETTINGS.TIME.FULL_CYCLE_MS) {
            this.elapsed = 0;
            this.day++;
        }
    }
    getData() {
        const ratio = this.elapsed / SETTINGS.TIME.FULL_CYCLE_MS;
        const totalMinutes = ratio * 1440;
        const h = Math.floor(totalMinutes / 60);
        const m = Math.floor(totalMinutes % 60);
        const isNight = h < SETTINGS.TIME.MORNING_START || h > SETTINGS.TIME.NIGHT_START;
        return { h, m, isNight, ratio };
    }
}

// --- MOTOR PRINCIPAL ---
class Engine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.sprites = new SpriteManager();
        this.particles = new ParticleSystem();
        this.camera = new Camera();
        this.clock = new Clock();
        
        this.player = {
            x: 500, y: 500, vx: 0, vy: 0,
            seeds: 0, w: 32, h: 32
        };
        
        this.entities = [];
        this.keys = {};
        this.notifications = [];
        this.weather = { raining: false, timer: 5000 };
        
        this.lastTime = 0;
        this.init();
    }

    init() {
        this.canvas.width = SETTINGS.SCREEN.WIDTH;
        this.canvas.height = SETTINGS.SCREEN.HEIGHT;
        
        // Generar mundo
        for(let i=0; i<8; i++) {
            for(let j=0; j<8; j++) {
                this.entities.push(new Pot(400 + i*64, 400 + j*64));
            }
        }

        window.addEventListener('keydown', e => this.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
        
        requestAnimationFrame(t => this.mainLoop(t));
    }

    notify(text) {
        this.notifications.push({ text, life: 3000 });
    }

    update(dt) {
        // Movimiento Jugador con Inercia
        if(this.keys['w'] || this.keys['arrowup']) this.player.vy -= SETTINGS.PHYSICS.ACCEL;
        if(this.keys['s'] || this.keys['arrowdown']) this.player.vy += SETTINGS.PHYSICS.ACCEL;
        if(this.keys['a'] || this.keys['arrowleft']) this.player.vx -= SETTINGS.PHYSICS.ACCEL;
        if(this.keys['d'] || this.keys['arrowright']) this.player.vx += SETTINGS.PHYSICS.ACCEL;

        this.player.vx *= SETTINGS.PHYSICS.FRICTION;
        this.player.vy *= SETTINGS.PHYSICS.FRICTION;
        this.player.x += this.player.vx;
        this.player.y += this.player.vy;

        // Limites del mundo
        this.player.x = Utils.clamp(this.player.x, 0, SETTINGS.WORLD.COLS*32-32);
        this.player.y = Utils.clamp(this.player.y, 0, SETTINGS.WORLD.ROWS*32-32);

        this.camera.follow(this.player);
        this.clock.update(dt);
        this.particles.update(dt);

        // Clima
        this.weather.timer -= dt;
        if(this.weather.timer <= 0) {
            this.weather.raining = !this.weather.raining;
            this.weather.timer = this.weather.raining ? 15000 : 30000;
            this.notify(this.weather.raining ? "Ha empezado a llover" : "La lluvia ha parado");
        }
        if(this.weather.raining) this.particles.emitRain(800, 600);

        // Spawn de semillas
        if(Math.random() < 0.005) {
            this.entities.push(new SeedItem(Utils.random(0, SETTINGS.WORLD.COLS*32), Utils.random(0, SETTINGS.WORLD.ROWS*32)));
        }

        // Interacciones
        if(this.keys['e']) {
            this.entities.forEach(ent => {
                const d = Utils.dist(this.player.x, this.player.y, ent.x, ent.y);
                if(d < 50) {
                    if(ent instanceof SeedItem && !ent.toRemove) {
                        this.player.seeds++;
                        ent.toRemove = true;
                        this.particles.emit(ent.x, ent.y, '#f0e68c');
                        this.notify("Semilla recogida");
                    }
                }
            });
            this.keys['e'] = false;
        }

        if(this.keys[' ']) {
            this.entities.forEach(ent => {
                const d = Utils.dist(this.player.x, this.player.y, ent.x, ent.y);
                if(d < 50 && ent instanceof Pot && !ent.hasSeed && this.player.seeds > 0) {
                    ent.hasSeed = true;
                    this.player.seeds--;
                    this.particles.emit(ent.x, ent.y, '#228b22');
                    this.notify("Semilla plantada");
                }
            });
            this.keys[' '] = false;
        }

        // Limpieza de entidades y update
        this.entities = this.entities.filter(e => !e.toRemove);
        this.entities.forEach(e => e.update(dt));

        // Notificaciones
        this.notifications.forEach(n => n.life -= dt);
        this.notifications = this.notifications.filter(n => n.life > 0);
    }

    render() {
        const { h, m, isNight, ratio } = this.clock.getData();
        const ctx = this.ctx;
        
        // Dibujar Fondo (Culling básico)
        ctx.fillStyle = '#222';
        ctx.fillRect(0,0,800,600);
        
        // Tiles de Pasto
        for(let i=0; i<SETTINGS.WORLD.COLS; i++) {
            for(let j=0; j<SETTINGS.WORLD.ROWS; j++) {
                const tx = i*32; const ty = j*32;
                if(tx > this.camera.x - 32 && tx < this.camera.x + 800 && ty > this.camera.y - 32 && ty < this.camera.y + 600) {
                    ctx.drawImage(this.sprites.grass, tx - this.camera.x, ty - this.camera.y);
                }
            }
        }

        // Dibujar Entidades
        this.entities.forEach(ent => ent.draw(ctx, this.sprites, this.camera));
        
        // Dibujar Jugador
        ctx.drawImage(this.sprites.player, this.player.x - this.camera.x, this.player.y - this.camera.y - 16);

        // Partículas
        this.particles.draw(ctx, this.camera);

        // Ciclo Día/Noche (Filtro)
        let intensity = 0;
        if(h >= 18 || h < 6) intensity = 0.5;
        if(h === 18 || h === 5) intensity = 0.25;
        
        ctx.fillStyle = `rgba(10, 10, 40, ${intensity})`;
        ctx.fillRect(0,0,800,600);

        // UI - HUD
        this.renderHUD(h, m, isNight);
    }

    renderHUD(h, m, isNight) {
        const ctx = this.ctx;
        // Reloj
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(10, 10, 150, 60);
        ctx.fillStyle = '#fff';
        ctx.font = '16px "Courier New"';
        ctx.fillText(`DÍA: ${this.clock.day}`, 20, 30);
        ctx.fillText(`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')} ${isNight?'NOCHE':'DÍA'}`, 20, 50);

        // Inventario
        ctx.fillRect(SETTINGS.SCREEN.WIDTH - 160, 10, 150, 40);
        ctx.fillStyle = '#f0e68c';
        ctx.fillText(`SEMILLAS: ${this.player.seeds}`, SETTINGS.SCREEN.WIDTH - 150, 35);

        // Notificaciones
        this.notifications.forEach((n, i) => {
            ctx.fillStyle = `rgba(255,255,255, ${n.life/1000})`;
            ctx.fillText(n.text, 10, 580 - (i*20));
        });

        // Controles prompt
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '10px "Courier New"';
        ctx.fillText("WASD: Mover | E: Recoger | ESPACIO: Plantar", 10, 100);
    }

    mainLoop(time) {
        const dt = time - this.lastTime;
        this.lastTime = time;

        if(dt < 100) { // Evitar saltos grandes por lag
            this.update(dt);
            this.render();
        }
        
        requestAnimationFrame(t => this.mainLoop(t));
    }
}

const game = new Engine();

// [Lógica de colisiones avanzada para objetos del entorno]
class PhysicsEngine {
    static checkRectCollision(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x &&
               r1.y < r2.y + r2.h && r1.h + r1.y > r2.y;
    }
}
